      description: Exports a report in the specified format (e.g. PDF, CSV).
      parameters:
      - description: Report ID
        in: path
        name: id
        required: true
        type: string
      - description: Export Format
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api_handler.exportRequest'
      produces:
      - application/octet-stream
      responses:
        "200":
          description: OK
          schema:
            type: file
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Export Report
      tags:
      - Report
  /v1/reports/compare:
    get:
      description: Compares two test runs (baseline vs current).
      parameters:
      - description: Baseline Run ID
        in: query
        name: run1
        required: true
        type: string
      - description: Current Run ID
        in: query
        name: run2
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Compare Reports
      tags:
      - Report
  /v1/runs:
    get:
      description: Lists all test runs for a given project.
      parameters:
