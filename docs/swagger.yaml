        in: query
        name: project_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_mr-isik_gatling-backend_internal_domain.TestRun'
            type: array
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
