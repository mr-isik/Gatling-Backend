        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: List Projects
      tags:
      - Project
    post:
      consumes:
      - application/json
      description: Creates a new project.
      parameters:
      - description: Project Data
        in: body
        name: project
        required: true
        schema:
          $ref: '#/definitions/github_com_mr-isik_gatling-backend_internal_domain.Project'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/github_com_mr-isik_gatling-backend_internal_domain.Project'
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Create Project
      tags:
      - Project
  /v1/projects/{id}/members:
    post:
      consumes:
      - application/json
      description: Adds a new member to a project.
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      - description: Member Info
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_api_handler.addMemberRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
