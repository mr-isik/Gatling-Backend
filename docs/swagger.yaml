        in: query
        name: from
        type: string
      - description: End Time (RFC3339)
        in: query
        name: to
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/github_com_mr-isik_gatling-backend_internal_domain.AggregatedMetric'
