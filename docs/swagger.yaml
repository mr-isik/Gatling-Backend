      tags:
      - Project
  /v1/projects/{id}/usage:
    get:
      description: Gets the usage statistics (runs, VUs) for a project.
      parameters:
      - description: Project ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
